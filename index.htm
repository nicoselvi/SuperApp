<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SuperApp Timbratore</title>

<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">

<!-- libreria grafici -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>SuperApp ⏱️ Timbratore</h1>
</header>

<section id="dashboard">

<h2>Utente: <span id="current-user"></span></h2>

<div class="features">

<div class="feature">
<h3>📅 Calendario Mensile</h3>
<div id="calendar"></div>
</div>

<div class="feature">
<h3>📊 Grafico Ore Lavorate</h3>
<canvas id="hoursChart"></canvas>
</div>

<div class="feature">
<h3>☁️ Backup Automatico</h3>
<button id="backup-btn">Salva dati</button>
</div>

<div class="feature">
<h3>📄 Export Excel</h3>
<button id="export-btn">Scarica CSV</button>
</div>

<div class="feature">
<h3>📍 GPS Timbratura</h3>
<p id="gps-info">Nessuna timbratura</p>
</div>

</div>

<button id="logout-btn">Ricarica App</button>

</section>

<script src="js/calendar.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>

</body>
</html>
