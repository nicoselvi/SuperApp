<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperApp - Timbratore</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>SuperApp ⏱️</h1>
    </header>

    <!-- Login -->
    <section id="login-section">
        <h2>Login</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Accedi</button>
        </form>
        <p id="login-error" class="error"></p>
    </section>

    <!-- Dashboard -->
    <section id="dashboard" style="display:none;">
        <h2>Benvenuto, <span id="current-user"></span></h2>

        <div class="features">
            <div class="feature">
                <h3>📅 Calendario Mensile</h3>
                <div id="calendar"></div>
            </div>
            <div class="feature">
                <h3>📊 Grafico Ore Lavorate</h3>
                <canvas id="hoursChart"></canvas>
            </div>
            <div class="feature">
                <h3>☁️ Backup Automatico</h3>
                <button id="backup-btn">Salva Dati</button>
            </div>
            <div class="feature">
                <h3>📄 Export PDF / Excel</h3>
                <button id="export-btn">Esporta</button>
            </div>
            <div class="feature">
                <h3>📍 GPS Timbratura</h3>
                <p id="gps-info">Non ancora timbrato</p>
            </div>
        </div>

        <button id="logout-btn">Logout</button>
    </section>

    <script src="js/calendar.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
