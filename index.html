<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Timbratore Futuristico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top left, #0f0c29, #302b63, #24243e);
    color: #00fff7;
    padding: 2rem;
    text-align: center;
}

header h1 {
    font-size: 2.5rem;
    margin-bottom: 2rem;
    color: #00fff7;
    text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7, 0 0 30px #00fff7;
}

button {
    font-size: 1.4rem;
    padding: 1rem 3rem;
    margin: 1rem;
    cursor: pointer;
    border: 2px solid #00fff7;
    border-radius: 15px;
    background: transparent;
    color: #00fff7;
    transition: all 0.3s ease;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,255,247,0.5);
}

button:hover {
    background: #00fff7;
    color: #0f0c29;
    box-shadow: 0 0 40px #00fff7, 0 0 80px #00fff7;
    transform: scale(1.1);
}

#log {
    margin-top: 3rem;
    background: rgba(0,255,247,0.05);
    padding: 2rem;
    border-radius: 20px;
    max-width: 450px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
    font-size: 1.2rem;
    line-height: 2rem;
    box-shadow: 0 0 20px rgba(0,255,247,0.3);
}
</style>
</head>
<body>

<header>
<h1>Super Timbratore Futuristico</h1>
</header>

<div>
    <button id="start-btn">Entrata</button>
    <button id="end-btn">Uscita</button>
</div>

<div id="log">Nessuna timbratura effettuata</div>

<script>
const logDiv = document.getElementById('log');

// Recupera dati dal localStorage o inizializza
let timbrature = JSON.parse(localStorage.getItem('timbrature')) || {};

// Funzione per aggiornare il log
function updateLog(){
    const today = new Date().toLocaleDateString();
    const t = timbrature[today] || {};
    let html = `GIORNO: ${today}<br>`;
    html += `ENTRATA MATTINA: ${t.startMorning || '-'}<br>`;
    html += `USCITA MATTINA: ${t.endMorning || '-'}<br>`;
    html += `ENTRATA POMERIGGIO: ${t.startAfternoon || '-'}<br>`;
    html += `USCITA POMERIGGIO: ${t.endAfternoon || '-'}<br>`;
    logDiv.innerHTML = html;
}

// Funzione timbrazione automatica
function timbra(type){
    const today = new Date().toLocaleDateString();
    if(!timbrature[today]) timbrature[today] = {};
    const now = new Date().toLocaleTimeString();

    // Logica automatica Mattina/Pomeriggio
    if(type === 'start') {
        if(!timbrature[today].startMorning) timbrature[today].startMorning = now;
        else if(!timbrature[today].startAfternoon) timbrature[today].startAfternoon = now;
    } 
    if(type === 'end') {
        if(!timbrature[today].endMorning) timbrature[today].endMorning = now;
        else if(!timbrature[today].endAfternoon) timbrature[today].endAfternoon = now;
    }

    localStorage.setItem('timbrature', JSON.stringify(timbrature));
    updateLog();
}

// Eventi pulsanti
document.getElementById('start-btn').addEventListener('click', ()=> timbra('start'));
document.getElementById('end-btn').addEventListener('click', ()=> timbra('end'));

// Mostra subito il log
updateLog();
</script>

</body>
</html>
